[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -ra

markers =
    integration: external systems (Mongo/Docker)
    ai_live: live paid AI tests (requires API keys)
    ai_batch: live batch runs (multiple AI calls, paid)
    ai_consistency: repeated runs with same input to test stability
    ai_judge: AI audit / judge evaluation tests
    ai_image: image pipeline AI tests (photo -> AI -> score)

# IMPORTANT:
# Do NOT enforce a global timeout here because live AI tests can be slow.
# We'll apply longer timeouts only when running ai_live tests via CLI.